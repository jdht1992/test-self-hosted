name: Test Minikube Setup

on:
  push:
    branches:
      - main

jobs:
  test-minikube:
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Crear archivo de contraseñas de vault
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
          chmod 600 .vault_pass

      - name: Run Minikube setup playbook
        run: ansible-playbook ansible/setup-minikube-playbook.yml --vault-password-file .vault_pass

      - name: Limpiar archivo de contraseñas
        if: always() # Se ejecuta incluso si el playbook falla
        run: rm -f .vault_pass